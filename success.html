<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Gracias por su compra</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#f7f7f7}
    .card{background:#fff;padding:28px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.08);max-width:720px;width:92%;text-align:center}
    .check{font-size:56px;color:#28a745;margin-bottom:8px}
    h1{margin:0 0 8px 0;color:#222}
    p{color:#555;margin:0 0 18px}
    .btn{display:inline-block;padding:10px 18px;background:#0070f3;color:#fff;border-radius:6px;text-decoration:none}
    .small{font-size:13px;color:#777;margin-top:12px}
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✔</div>
    <h1>Gracias por su compra</h1>
    <p>Hemos recibido su pago correctamente. En breve le llegará un correo de confirmación con los detalles de su orden.</p>
    <a id="home" class="btn" href="/index.html">Volver al inicio</a>
    <div class="small">Si necesita ayuda, responda el correo de confirmación o contáctenos desde la página.</div>
  </div>

  <script>
    // If you want to read session_id from query and optionally show it, you can use this.
    (function(){
      const params = new URLSearchParams(window.location.search);
      const sid = params.get('session_id');
      if (sid) {
        // could fetch session details via server if needed
        console.log('Checkout session id:', sid);
      }
    })();
  </script>
</body>
</html>
