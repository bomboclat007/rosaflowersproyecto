<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create Invoice - Local</title>
  <link rel="stylesheet" href="/assets/css/admin.css">
  <style>
    .invoice-container{max-width:1100px;margin:18px auto;background:#fff;padding:18px;border-radius:8px;border:1px solid #eee}
    .invoice-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .invoice-table{width:100%;border-collapse:collapse;margin-top:12px}
    .invoice-table thead th{background:#f7f8fa;padding:10px;border-bottom:1px solid #eee;text-align:left}
    .invoice-table td{padding:8px;border-bottom:1px solid #f1f1f1}
    .small{font-size:13px;color:#666}
    .totals{float:right;margin-top:12px;width:320px}
    .totals table{width:100%}
    .totals td{padding:6px}
    .actions{margin-top:18px;display:flex;gap:10px;justify-content:flex-end}
    .btn.secondary{background:#06c15f}
    input[type=number]{width:90px}
    .qty{width:70px}
    .desc{width:100%}
    .remove-btn{background:#ff6b6b;border:none;color:#fff;padding:6px 8px;border-radius:6px;cursor:pointer}
    .add-line{background:#0b5cff;color:#fff;border:none;padding:8px 12px;border-radius:6px;cursor:pointer}
  </style>
</head>
<body>
  <header class="admin-header">
    <h1>Create Invoice (local copy)</h1>
    <div class="admin-actions">
      <button id="adminLogout">Cerrar sesiÃ³n</button>
    </div>
  </header>

  <main class="admin-main">
    <div class="invoice-container">
      <div class="invoice-header">
        <div>
          <div class="small">Customer</div>
          <strong>Walk-in Customer</strong>
        </div>
        <div style="text-align:right">
          <div class="small">Invoice #</div>
          <strong>INV-0001</strong>
        </div>
      </div>

      <table class="invoice-table" id="lines">
        <thead>
          <tr>
            <th style="width:48%">Description</th>
            <th style="width:12%">Qty</th>
            <th style="width:15%">Price</th>
            <th style="width:15%">Subtotal</th>
            <th style="width:10%"> </th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>

      <div style="margin-top:10px">
        <button class="add-line" id="addLine">+ Add line</button>
      </div>

      <div class="totals" id="totals">
        <table>
          <tr><td>Subtotal</td><td style="text-align:right" id="subtotal">$0.00</td></tr>
          <tr><td>Tax (10%)</td><td style="text-align:right" id="tax">$0.00</td></tr>
          <tr><td><strong>Total</strong></td><td style="text-align:right" id="total"><strong>$0.00</strong></td></tr>
        </table>
      </div>

      <div style="clear:both"></div>

      <div class="actions">
        <button class="btn">Save Draft</button>
        <button class="btn secondary">Create Invoice</button>
      </div>
    </div>
  </main>

  <script>
    document.getElementById('adminLogout').addEventListener('click', function(){
      try { localStorage.removeItem('site_session'); } catch(e){}
      window.location.href = '/';
    });

    const linesTbody = document.querySelector('#lines tbody');
    const addBtn = document.getElementById('addLine');
    const subtotalEl = document.getElementById('subtotal');
    const taxEl = document.getElementById('tax');
    const totalEl = document.getElementById('total');

    function money(n){
      return '$' + n.toFixed(2);
    }

    function recalc(){
      let sub = 0;
      linesTbody.querySelectorAll('tr').forEach(tr => {
        const qty = parseFloat(tr.querySelector('.qty input').value) || 0;
        const price = parseFloat(tr.querySelector('.price input').value) || 0;
        const st = qty * price;
        tr.querySelector('.subtotal').textContent = money(st);
        sub += st;
      });
      const tax = sub * 0.10;
      subtotalEl.textContent = money(sub);
      taxEl.textContent = money(tax);
      totalEl.textContent = money(sub + tax);
    }

    function addLine(desc='', qty=1, price=0){
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="desc"><input type="text" placeholder="Description" value="${desc}" style="width:100%;padding:6px;border:1px solid #e6e6e6;border-radius:6px"/></td>
        <td class="qty"><input type="number" min="0" value="${qty}" style="padding:6px;border:1px solid #e6e6e6;border-radius:6px"/></td>
        <td class="price"><input type="number" min="0" step="0.01" value="${price}" style="padding:6px;border:1px solid #e6e6e6;border-radius:6px"/></td>
        <td class="subtotal">$0.00</td>
        <td style="text-align:center"><button class="remove-btn">Ã—</button></td>
      `;
      linesTbody.appendChild(tr);
      tr.querySelectorAll('input').forEach(i => i.addEventListener('input', recalc));
      
      tr.querySelector('.remove-btn').addEventListener('click', function(){ tr.remove(); recalc(); });
      recalc();
    }

    addBtn.addEventListener('click', function(){ addLine(); });

    // start with 1 empty line
    addLine('Example bouquet',1,45.00);
  </script>
<script src="assets/js/footer-logo-replace.js" defer></script>`n</body>
</html>
