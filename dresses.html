<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Dresses — The Floral Cottage</title>
    <meta name="description" content="Dresses collection (local view) — The Floral Cottage" />
    <link rel="canonical" href="/dresses.html" />
    <meta name="robots" content="noindex" />
    <style>html{visibility:hidden!important;}body{margin:0}</style>
  </head>
  <body>
    <div id="loader" style="width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;font-family:Arial,Helvetica,sans-serif">Cargando Dresses…</div>
    <script>
      // Quick local workaround: fetch the working Daily Flowers page and inject it into this document,
      // then fix metadata to present it as the Dresses page. This avoids a server redirect and
      // lets Live Server serve /dresses.html directly for testing.
      (function(){
        var target = '/proyectooficial-j892d73v9-truenojf10-gmailcoms-projects.vercel.app/dailyflowers.html';
        fetch(target, {credentials: 'same-origin'}).then(function(resp){
          return resp.text();
        }).then(function(html){
          try{
            // Replace DOCTYPE/html/head to avoid nested html elements when we write
            var parser = new DOMParser();
            var doc = parser.parseFromString(html, 'text/html');
            // take body HTML and write it into current document
            document.open();
            document.write('<!doctype html>' + doc.documentElement.innerHTML);
            document.close();
            // Update title and canonical to Dresses
            try{ document.title = 'Dresses — The Floral Cottage'; }catch(e){}
            var link = document.querySelector('link[rel="canonical"]');
            if(!link){ link = document.createElement('link'); link.setAttribute('rel','canonical'); document.head.appendChild(link); }
            link.setAttribute('href','/dresses.html');
            // remove any meta-refresh fallback that may redirect elsewhere
            var m = document.querySelectorAll('meta[http-equiv="refresh"]');
            m && m.forEach(function(n){ n.parentNode && n.parentNode.removeChild(n); });
            // ensure page is visible
            try{ document.documentElement.style.visibility=''; }catch(e){}

            // Fix common image path issues and inject a fallback logo into the header so the
            // top area displays correctly when relative paths are broken in this root context.
            try{
              (function(){
                var logoUrl = 'https://images.squarespace-cdn.com/content/v1/56aa9020d51cd471ca1987f8/569712f9-bcaa-42d5-a41c-ed4562760cc1/round%2Blogo.png';
                // Fix protocol-relative URLs (//...) to absolute https://
                document.querySelectorAll('img').forEach(function(img){
                  var s = img.getAttribute('src') || '';
                  if(s.indexOf('//') === 0){ img.src = 'https:' + s; }
                  // Fix simple ../ relative paths by stripping leading ../ segments so they resolve from root
                  if(/^\.{2}(\/.*)+/.test(s)){
                    img.src = s.replace(/^(?:\.\.\/)+/, '/');
                  }
                });

                // Ensure there's a visible logo in the header; insert one if missing
                var header = document.querySelector('header#header') || document.querySelector('header');
                if(header && !header.querySelector('.logo-override')){
                  var style = document.createElement('style');
                  style.innerHTML = '.logo-override img{height:48px;display:block;max-height:64px;max-width:220px;} .logo-override{display:inline-block;margin:6px 12px;}';
                  document.head.appendChild(style);

                  var a = document.createElement('a');
                  a.href = '/';
                  a.className = 'logo-override';
                  a.setAttribute('aria-label','The Floral Cottage');
                  var img = document.createElement('img');
                  img.src = logoUrl;
                  img.alt = 'The Floral Cottage';
                  a.appendChild(img);
                  // Insert at the start of header so it matches typical placement
                  header.insertBefore(a, header.firstChild);
                }
              })();
            }catch(e){ console.warn('logo-fix failed', e); }

            // Ensure Stripe products load on the injected page:
            // - set the force flag the loader checks
            // - re-insert the loader script (cache-busted) so it executes in this document context
            try{
              window.STRIPE_FORCE_TEST = true;
              (function(){
                // Try to locate an existing loader script in the injected HTML
                var candidate = document.querySelector('script[src*="load_products.js"], script[src*="stripe-products.js"], script[src*="stripe-products"]');
                var src = candidate && candidate.src ? candidate.src : '/assets/js/load_products.js';
                // create a fresh script element to re-run the loader in this new context
                var s = document.createElement('script');
                s.src = src + (src.indexOf('?') > -1 ? '&' : '?') + 'r=' + Date.now();
                s.async = true;
                s.onload = function(){ try{ console.info('Stripe loader reloaded'); }catch(e){} };
                s.onerror = function(){ console.warn('Stripe loader failed to load', src); };
                // append to body (or head if body not available)
                (document.body || document.head || document.documentElement).appendChild(s);
              })();
              // let other code know the injected content is ready
              try{ document.dispatchEvent(new Event('injectedPageReady')); }catch(e){}

            // Make visible text and navigation read as "Dresses" instead of "Daily Flowers"
            try{
              (function(){
                // Update common meta/title tags
                try{ document.title = 'Dresses — The Floral Cottage'; }catch(e){}
                var og = document.querySelector('meta[property="og:title"]'); if(og) og.setAttribute('content','Dresses — The Floral Cottage');
                var tw = document.querySelector('meta[name="twitter:title"]'); if(tw) tw.setAttribute('content','Dresses — The Floral Cottage');

                // Replace visible text nodes that contain the phrase "Daily Flowers"
                var reps = [
                  [/Daily Flowers/g, 'Dresses'],
                  [/DAILY FLOWERS/g, 'DRESSES'],
                  [/Daily flowers/g, 'Dresses']
                ];
                function walkAndReplace(node){
                  for(var child=node.firstChild; child; child=child.nextSibling){
                    if(child.nodeType === 3){ // text node
                      var v = child.nodeValue;
                      var nv = v;
                      reps.forEach(function(r){ nv = nv.replace(r[0], r[1]); });
                      if(nv !== v) child.nodeValue = nv;
                    }else if(child.nodeType === 1 && child.tagName !== 'SCRIPT' && child.tagName !== 'STYLE'){
                      walkAndReplace(child);
                    }
                  }
                }
                try{ walkAndReplace(document.body); }catch(e){/* best-effort */}

                // Force common collection title selectors to 'Dresses' (best-effort)
                var titleSel = document.querySelector('h1.collection-title, h1.entry-title, .collection-title, .page-title');
                if(titleSel) titleSel.textContent = 'Dresses';

                // Mark the Dresses nav link as active/current and remove the class from others
                var dressesLink = document.querySelector('a[href="/dresses.html"], a[href="dresses.html"]');
                if(dressesLink){
                  dressesLink.classList.add('current','active');
                  document.querySelectorAll('a.current, a.active').forEach(function(a){ if(a !== dressesLink){ a.classList.remove('current','active'); }});
                }
              })();
            }catch(e){ console.warn('post-inject text-replace failed', e); }
            }catch(e){ console.warn('stripe-init failed', e); }
          }catch(err){
            console.error('injection error', err);
            // fallback: navigate to nested dresses if fetch fails
            window.location.href = '/proyectooficial-j892d73v9-truenojf10-gmailcoms-projects.vercel.app/dresses.html';
          }
        }).catch(function(){
          // if we can't fetch the dailyflowers copy, fall back to the nested dresses path
          window.location.href = '/proyectooficial-j892d73v9-truenojf10-gmailcoms-projects.vercel.app/dresses.html';
        });
      })();
    </script>
  </body>
</html>
